<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>আধুনিক ক্যালকুলেটর | বাংলা ক্যালকুলেটর</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .display {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px 25px;
            text-align: right;
            color: white;
        }

        .previous-operand {
            min-height: 32px;
            font-size: 1.2rem;
            color: #94a3b8;
            word-wrap: break-word;
            word-break: break-all;
            letter-spacing: 1px;
        }

        .current-operand {
            font-size: 3rem;
            font-weight: 600;
            margin-top: 10px;
            word-wrap: break-word;
            word-break: break-all;
            letter-spacing: 2px;
            min-height: 80px;
            line-height: 1.2;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #e2e8f0;
            padding: 1px;
        }

        button {
            border: none;
            background: white;
            padding: 25px 15px;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1e293b;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            filter: brightness(0.95);
        }

        .operator {
            background: #fef9c3;
            color: #854d0e;
        }

        .equals {
            background: #22c55e;
            color: white;
            font-size: 1.8rem;
        }

        .clear {
            background: #ef4444;
            color: white;
        }

        .delete {
            background: #f97316;
            color: white;
        }

        .number {
            background: white;
            font-weight: 600;
        }

        .zero {
            grid-column: span 2;
        }

        .dot {
            font-weight: bold;
        }

        @media (max-width: 480px) {
            button {
                padding: 20px 12px;
                font-size: 1.2rem;
            }
            
            .current-operand {
                font-size: 2.2rem;
                min-height: 60px;
            }
            
            .display {
                padding: 20px;
            }
        }

        @keyframes clickAnim {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        button:active {
            animation: clickAnim 0.1s ease;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previousOperand"></div>
            <div class="current-operand" id="currentOperand">0</div>
        </div>
        <div class="buttons">
            <button class="clear" data-action="clear">AC</button>
            <button class="delete" data-action="delete">⌫</button>
            <button class="operator" data-operator="%">%</button>
            <button class="operator" data-operator="/">÷</button>
            
            <button class="number" data-number="7">7</button>
            <button class="number" data-number="8">8</button>
            <button class="number" data-number="9">9</button>
            <button class="operator" data-operator="*">×</button>
            
            <button class="number" data-number="4">4</button>
            <button class="number" data-number="5">5</button>
            <button class="number" data-number="6">6</button>
            <button class="operator" data-operator="-">-</button>
            
            <button class="number" data-number="1">1</button>
            <button class="number" data-number="2">2</button>
            <button class="number" data-number="3">3</button>
            <button class="operator" data-operator="+">+</button>
            
            <button class="number zero" data-number="0">0</button>
            <button class="dot" data-dot=".">.</button>
            <button class="equals" data-equals>=</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor(previousOperandElement, currentOperandElement) {
                this.previousOperandElement = previousOperandElement;
                this.currentOperandElement = currentOperandElement;
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.shouldResetScreen = false;
                this.updateDisplay();
            }

            delete() {
                if (this.currentOperand === '0') return;
                if (this.currentOperand.length === 1) {
                    this.currentOperand = '0';
                } else {
                    this.currentOperand = this.currentOperand.slice(0, -1);
                }
                this.updateDisplay();
            }

            appendNumber(number) {
                if (this.shouldResetScreen) {
                    this.currentOperand = '';
                    this.shouldResetScreen = false;
                }
                
                // Prevent multiple decimal points
                if (number === '.' && this.currentOperand.includes('.')) return;
                
                // Prevent leading zeros
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number;
                } else {
                    this.currentOperand += number;
                }
                this.updateDisplay();
            }

            chooseOperation(operation) {
                if (this.currentOperand === '') return;
                
                if (this.previousOperand !== '') {
                    this.compute();
                }
                
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '';
                this.updateDisplay();
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                
                if (isNaN(prev) || isNaN(current)) return;
                
                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '*':
                        computation = prev * current;
                        break;
                    case '/':
                        if (current === 0) {
                            alert('শূন্য দিয়ে ভাগ করা সম্ভব নয়!');
                            return;
                        }
                        computation = prev / current;
                        break;
                    case '%':
                        computation = prev % current;
                        break;
                    default:
                        return;
                }
                
                // Handle floating point precision
                computation = parseFloat(computation.toFixed(10));
                
                this.currentOperand = computation.toString();
                this.operation = undefined;
                this.previousOperand = '';
                this.shouldResetScreen = true;
                this.updateDisplay();
            }

            updateDisplay() {
                // Format the current operand for better readability
                let displayCurrent = this.currentOperand;
                if (displayCurrent === '') displayCurrent = '0';
                
                // Add thousand separators for better readability (optional)
                if (!displayCurrent.includes('.') && !isNaN(parseFloat(displayCurrent))) {
                    // Only add separators for whole numbers, but keep it simple
                    // to avoid complexity
                }
                
                this.currentOperandElement.innerText = displayCurrent;
                
                if (this.operation != null) {
                    this.previousOperandElement.innerText = `${this.previousOperand} ${this.getOperationSymbol(this.operation)}`;
                } else {
                    this.previousOperandElement.innerText = '';
                }
            }
            
            getOperationSymbol(operation) {
                const symbols = {
                    '+': '+',
                    '-': '-',
                    '*': '×',
                    '/': '÷',
                    '%': '%'
                };
                return symbols[operation] || operation;
            }
        }

        // Initialize calculator
        const previousOperandElement = document.getElementById('previousOperand');
        const currentOperandElement = document.getElementById('currentOperand');
        const calculator = new Calculator(previousOperandElement, currentOperandElement);

        // Add event listeners for all buttons
        document.querySelectorAll('[data-number]').forEach(button => {
            button.addEventListener('click', () => {
                const number = button.getAttribute('data-number');
                calculator.appendNumber(number);
            });
        });

        document.querySelectorAll('[data-operator]').forEach(button => {
            button.addEventListener('click', () => {
                const operator = button.getAttribute('data-operator');
                calculator.chooseOperation(operator);
            });
        });

        document.querySelector('[data-equals]').addEventListener('click', () => {
            calculator.compute();
        });

        document.querySelector('[data-action="clear"]').addEventListener('click', () => {
            calculator.clear();
        });

        document.querySelector('[data-action="delete"]').addEventListener('click', () => {
            calculator.delete();
        });

        document.querySelector('[data-dot]').addEventListener('click', () => {
            calculator.appendNumber('.');
        });

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            
            // Numbers
            if (/[0-9]/.test(key)) {
                calculator.appendNumber(key);
                event.preventDefault();
            }
            
            // Decimal point
            if (key === '.' || key === ',') {
                calculator.appendNumber('.');
                event.preventDefault();
            }
            
            // Operators
            if (key === '+') {
                calculator.chooseOperation('+');
                event.preventDefault();
            }
            if (key === '-') {
                calculator.chooseOperation('-');
                event.preventDefault();
            }
            if (key === '*') {
                calculator.chooseOperation('*');
                event.preventDefault();
            }
            if (key === '/') {
                calculator.chooseOperation('/');
                event.preventDefault();
            }
            if (key === '%') {
                calculator.chooseOperation('%');
                event.preventDefault();
            }
            
            // Enter or = for equals
            if (key === 'Enter' || key === '=') {
                calculator.compute();
                event.preventDefault();
            }
            
            // Escape for clear
            if (key === 'Escape') {
                calculator.clear();
                event.preventDefault();
            }
            
            // Backspace for delete
            if (key === 'Backspace') {
                calculator.delete();
                event.preventDefault();
            }
        });
        
        // Add touch feedback for mobile devices
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
</html>
